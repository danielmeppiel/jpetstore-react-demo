name: jpetstore-react-demo
version: 0.1.0
description: >-
  Demo subject app for the java-to-react-modernizer skill: a legacy
  JSP + Stripes + MyBatis Java store (derived from mybatis/jpetstore-6).
  Running `apm install` here pulls the modernizer skill in as an apm
  dependency so it can be migrated to React/JS in place.
author: danielmeppiel
license: Apache-2.0

# Deploy the pulled skill + agents for the Copilot harness.
targets:
  - copilot

dependencies:
  apm:
    - danielmeppiel/java-to-react-modernizer#main
  mcp: []
